; LIMINAL — PlatformIO Configuration
; Flash node 0: pio run -e node0 -t upload

[platformio]
default_envs = node0, node1, node2, node3

[common]
platform = espressif32@6.5.0
board = heltec_wifi_lora_32_V2
framework = arduino
monitor_speed = 115200
lib_deps =
    sandeepmistry/LoRa@^0.8.0
build_flags =
    -DARDUINO_HELTEC_WIFI_LORA_32_V2
    -DSS=18
    -DFREQUENCY=868E6

[env:node0]
extends = common
build_flags = ${common.build_flags} -DNODE_ID=0

[env:node1]
extends = common
build_flags = ${common.build_flags} -DNODE_ID=1

[env:node2]
extends = common
build_flags = ${common.build_flags} -DNODE_ID=2

[env:node3]
extends = common
build_flags = ${common.build_flags} -DNODE_ID=3