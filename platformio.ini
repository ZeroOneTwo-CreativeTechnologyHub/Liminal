; LIMINAL — PlatformIO Configuration
; Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262 + SSD1306 OLED)

[platformio]
default_envs = node0, node1, node2, node3

[common]
platform = espressif32@6.5.0
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
lib_deps =
    jgromes/RadioLib@^6.4.0
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.4.0
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DFREQUENCY=868.0
    ; ^^^ Change to 915.0 for US/AU

[env:node0]
extends = common
build_flags = ${common.build_flags} -DNODE_ID=0

[env:node1]
extends = common
build_flags = ${common.build_flags} -DNODE_ID=1

[env:node2]
extends = common
build_flags = ${common.build_flags} -DNODE_ID=2

[env:node3]
extends = common
build_flags = ${common.build_flags} -DNODE_ID=3